name: Sync GitHub Stats

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    if: ${{ !startsWith(github.event.head_commit.message, 'Update stats:') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - run: git lfs install

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm

      - run: npm ci

      - run: npm run sync
        timeout-minutes: 120
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          GITHUB_USERNAME: ${{ github.repository_owner }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json data/full.json.enc
          if ! git diff --staged --quiet; then
            git commit -F data/commit-message.txt
            git pull --rebase
            git push
          fi
          rm -f data/commit-message.txt
