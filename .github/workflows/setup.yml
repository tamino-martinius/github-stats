name: Setup User Branch

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create user branch with config
        env:
          BRANCH: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "::error::Branch '$BRANCH' already exists. Delete it first to re-setup."
            exit 1
          fi

          git checkout -b "$BRANCH"

          cat > config.json <<'EOF'
          {
            "$schema": "./config.schema.json",
            "exclude": ["__REPO__"]
          }
          EOF
          sed -i "s|__REPO__|${GITHUB_REPO}|" config.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json
          git commit -m "Setup stats for $BRANCH"
          git push -u origin "$BRANCH"
